openapi: 3.1.0
info:
  title: Seedream 3.0 文生图
  description: 通过 Starrise AI API 调用字节跳动 Seedream 3.0 文生图模型
  version: 1.0.0
servers:
  - url: https://ai.alad.com
security:
  - bearerAuth: []
paths:
  /v1/images/generations:
    post:
      summary: 创建文生图任务
      description: 使用 doubao-seedream-3-0-t2i-250415 模型从文本生成图片。
      operationId: createSeedream30T2i
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - prompt
              properties:
                model:
                  type: string
                  enum:
                    - doubao-seedream-3-0-t2i-250415
                  description: 模型 ID
                  example: doubao-seedream-3-0-t2i-250415
                prompt:
                  type: string
                  description: 图片生成提示词。
                  example: 生成3张女孩和奶牛玩偶在游乐园开心地坐过山车的图片
                size:
                  type: string
                  description: 输出图片尺寸，支持的值因模型而异。
                  example: 1024x1024
                watermark:
                  type: boolean
                  default: false
                  description: 是否添加水印。
                seed:
                  type: integer
                  description: 随机种子，用于复现结果。
                logo_info:
                  type: object
                  description: 自定义 Logo 水印配置。
                  properties:
                    add_logo:
                      type: boolean
                      description: 是否添加 Logo 水印。
                    position:
                      type: integer
                      description: Logo 位置。
                    language:
                      type: integer
                      description: Logo 语言。
                    opacity:
                      type: number
                      description: Logo 透明度（0-1）。
      responses:
        '200':
          description: 图片生成成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  model:
                    type: string
                    description: 使用的模型。
                    example: doubao-seedream-3-0-t2i-250415
                  created:
                    type: integer
                    description: 创建时间戳（Unix 秒）。
                    example: 1775029815
                  data:
                    type: array
                    description: 生成的图片列表。
                    items:
                      type: object
                      properties:
                        url:
                          type: string
                          description: 生成的图片 URL。
                          example: >-
                            https://ark-content-generation-v2-cn-beijing.example.com/image.png
                        size:
                          type: string
                          description: 图片尺寸。
                          example: 2048x2048
                  usage:
                    type: object
                    description: Token 用量。
                    properties:
                      generated_images:
                        type: integer
                        description: 生成的图片数量。
                        example: 1
                      output_tokens:
                        type: integer
                        description: 输出 Token 消耗。
                        example: 16384
                      total_tokens:
                        type: integer
                        description: 总 Token 消耗。
                        example: 16384
        '401':
          description: 未授权
        '429':
          description: 请求频率超限
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

